id: com.edde746.plezy
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm21
command: plezy
add-extensions:
  org.freedesktop.Platform.VAAPI.Intel:
    directory: lib/intel-vaapi-driver
    version: '25.08'
    autodelete: false
    no-autodownload: true
  org.freedesktop.Platform.GL:
    directory: lib/GL
    version: '25.08'
    versions: 25.08;1.4
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: vulkan/icd.d;glvnd/egl_vendor.d;egl/egl_external_platform.d;OpenCL/vendors;lib/dri;lib/d3d;vulkan/explicit_layer.d;vulkan/implicit_layer.d
    download-if: active-gl-driver
    enable-if: active-gl-driver
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=system-bus
  - --share=network
  - --share=ipc
  - --device=all
  - --talk-name=org.freedesktop.ScreenSaver
cleanup:
  - /bin/cargo-c
  - /bin/cargo-cinstall
  - /include
  - /lib/pkgconfig
  - /share/aclocal
  - /share/doc
  - /share/gtk-doc
  - /share/info
  - /share/man
  - /share/pkgconfig
  - '*.a'
  - '*.la'
modules:
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
      - -Dvaapi=enabled
      - -Ddrm=enabled
      - -Degl=enabled
      - -Degl-drm=enabled
      - -Dcuda-hwaccel=enabled
      - -Dpulse=enabled
      - -Dalsa=disabled
      - -Duchardet=enabled
      - --libdir=lib
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
    modules:
      - name: hwdata
        buildsystem: simple
        build-commands:
          - ./configure --prefix=/app --libdir=/app/lib --datadir=/app/share
          - make install
        sources:
          - type: git
            url: https://github.com/vcrhonek/hwdata.git
            tag: v0.405
            commit: be46d7186e918e62eb75de399e800145a781c8db
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
      - name: libdisplay-info
        buildsystem: meson
        config-opts:
          - --libdir=lib
        sources:
          - type: git
            url: https://gitlab.freedesktop.org/emersion/libdisplay-info.git
            tag: 0.3.0
            commit: 47a5590e9c4eb35d67651b8c05a55f1a48259329
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
      - name: cargo-c
        sources:
          - type: archive
            url: https://github.com/lu-zero/cargo-c/releases/download/v0.10.20/cargo-c-x86_64-unknown-linux-musl.tar.gz
            sha256: 4f886fda551b9105efe6e0abae0f9f0d76da2b7faccf8db2b15f3b680841b3e4
            strip-components: 0
        buildsystem: simple
        build-commands:
          - install -Dm755 cargo-cinstall /app/bin/cargo-cinstall
          - ln -sf /app/bin/cargo-cinstall /app/bin/cargo-c
      - name: libdovi
        buildsystem: simple
        build-options:
          append-path: /usr/lib/sdk/rust-stable/bin
          env:
            CARGO_HOME: /run/build/libdovi/cargo
        sources:
          - type: git
            url: https://github.com/quietvoid/dovi_tool.git
            tag: libdovi-3.3.2
            commit: 4fd2b2235c9f93582dd4a00e65ee34a07800afd7
            x-checker-data:
              type: git
              tag-pattern: ^libdovi-([\d.]+)$
          - cargo-sources/libdovi/libdovi.cargo-sources.json
        build-commands:
          - cd dolby_vision && cargo cinstall --release --features capi --prefix=/app
            --libdir=/app/lib --frozen
      - name: ffnvcodec
        buildsystem: simple
        build-commands:
          - make install PREFIX=/app
        sources:
          - type: git
            url: https://github.com/FFmpeg/nv-codec-headers.git
            tag: n13.0.19.0
            commit: e844e5b26f46bb77479f063029595293aa8f812d
            x-checker-data:
              type: git
              tag-pattern: ^n([\d.]+)$
      - name: ffmpeg
        cleanup:
          - /share/ffmpeg/examples
        config-opts:
          - --enable-shared
          - --disable-static
          - --enable-gnutls
          - --disable-doc
          - --disable-programs
          - --disable-encoders
          - --disable-muxers
          - --enable-encoder=png
          - --enable-vaapi
          - --enable-vdpau
          - --enable-libdrm
          - --enable-ffnvcodec
          - --enable-nvdec
        sources:
          - type: git
            url: https://git.ffmpeg.org/ffmpeg.git
            tag: n8.0.1
            commit: 894da5ca7d742e4429ffb2af534fcda0103ef593
            x-checker-data:
              type: git
              tag-pattern: ^n([\d.]+)$
      - name: fribidi
        buildsystem: meson
        config-opts:
          - -Ddocs=false
        sources:
          - type: git
            url: https://github.com/fribidi/fribidi.git
            tag: v1.0.16
            commit: 68162babff4f39c4e2dc164a5e825af93bda9983
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
      - name: libass
        config-opts:
          - --disable-static
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            tag: 0.17.4
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
      - name: uchardet
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=Release
          - -DBUILD_STATIC=0
          - -DCMAKE_INSTALL_LIBDIR=lib
          - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        cleanup:
          - /share/man
        sources:
          - type: git
            url: https://gitlab.freedesktop.org/uchardet/uchardet.git
            tag: v0.0.8
            commit: ae6302a016088ad07177f86d417b20010053632b
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Dvulkan=enabled
          - -Dshaderc=enabled
          - -Dlibdovi=enabled
          - -Ddemos=false
          - -Dc_args=-fvisibility=hidden
          - --libdir=lib
        sources:
          - type: git
            url: https://code.videolan.org/videolan/libplacebo.git
            tag: v7.360.0
            commit: b2ea27dceb6418aabfe9121174c6dbb232942998
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
  - name: libevdev
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dtests=disabled
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/libevdev/libevdev.git
        tag: libevdev-1.13.6
        commit: 139b58e135184f66a35c2401771f3d8134f097ad
        x-checker-data:
          type: git
          tag-pattern: ^libevdev-([\d.]+)$
  - name: plezy
    buildsystem: simple
    build-options:
      append-path: /var/lib/flutter/bin:/usr/lib/sdk/llvm21/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm21/lib
      env:
        PUB_CACHE: /run/build/plezy/.pub-cache
        CXX: clang++
        CC: clang
    build-commands:
      - sed -i '1s|^|set(FETCHCONTENT_FULLY_DISCONNECTED ON)\nset(FETCHCONTENT_SOURCE_DIR_SIMDUTF
        "${CMAKE_CURRENT_SOURCE_DIR}/simdutf_local")\nset(FETCHCONTENT_SOURCE_DIR_SQLITE3
        "${CMAKE_CURRENT_SOURCE_DIR}/sqlite3_local")\n|' linux/CMakeLists.txt
      - flutter build linux --release --no-pub --verbose
      - mkdir -p /app/lib/intel-vaapi-driver
      - mkdir -p /app/lib/GL
      - mkdir -p /app/bin
      - mkdir -p /app/opt && cp -r build/linux/x64/release/bundle /app/opt/plezy
      - |
        cat > /app/bin/plezy << EOF
        #!/bin/bash
        cd /app/opt/plezy
        exec ./plezy "$@"
        EOF
      - chmod +x /app/bin/plezy
      - install -Dm644 com.edde746.plezy.desktop /app/share/applications/com.edde746.plezy.desktop
      - install -Dm644 com.edde746.plezy.metainfo.xml /app/share/metainfo/com.edde746.plezy.metainfo.xml
      - install -Dm644 com.edde746.plezy.svg /app/share/icons/hicolor/scalable/apps/com.edde746.plezy.svg
    sources:
      - type: git
        url: https://github.com/edde746/plezy.git
        tag: 1.25.0
        commit: ff6e3ee92a5e18c457ee8324f98896ea4edfb7b1
        x-checker-data:
          type: git
          tag-pattern: ^([\d]+\.[\d]+\.[\d]+)$
      - type: archive
        url: https://github.com/simdutf/simdutf/releases/download/v8.1.0/singleheader.zip
        sha256: c3565a8567b21d0096d0366654db473597ea6e5408e464198dce0897be71e4d0
        dest: linux/simdutf_local
        x-checker-data:
          type: json
          url: https://api.github.com/repos/simdutf/simdutf/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="singleheader.zip") | .browser_download_url
      - type: archive
        url: https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz
        sha256: f6b50b0c103392af32a8be15b2b9d25959de9a00a70c3979128aafeaa5338b3f
        dest: linux/sqlite3_local
        x-checker-data:
          type: html
          url: https://sqlite.org/download.html
          version-pattern: (20\d{2}/sqlite-autoconf-\d+)\.tar\.gz
          url-template: https://sqlite.org/$version.tar.gz
      - type: dir
        path: ./extra/
      - type: patch
        path: patches/plezy-Wno-error.patch
      - type: patch
        path: patches/fix-linux-titlebar-theme.patch
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.41.4
        dest: flutter
        x-checker-data:
          type: git
          tag-pattern: ^([\d]+\.[\d]+\.[\d]+)$
        commit: ff37bef603469fb030f2b72995ab929ccfc227f0
