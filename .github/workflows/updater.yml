name: Check Upstream for Updates

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stub manifest
        run: |
          mkdir -p cargo-sources/libdovi
          cat << 'EOF' > cargo-sources/libdovi/libdovi.cargo-sources.json
          {}
          EOF

      - name: Run flatpak-external-data-checker (Edit Only)
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        with:
          args: --edit-only flatpak.yml

      - name: Branch, Commit, and Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if the checker actually changed anything
          if git diff --quiet flatpak.yml; then
            echo "No updates found. Exiting."
            exit 0
          fi

          VERSION_TAG=$(yq -r '.modules.[] | select(.name =="plezy") | .sources.[] | select(.type=="git" and (.url | match("edde746/plezy.git"))) | .tag' flatpak.yml)
          BRANCH_NAME="plezy-${VERSION_TAG}"

          BRANCH_EXISTS=$(git ls-remote --heads origin "$BRANCH_NAME")
          if [ -n "$BRANCH_EXISTS" ]; then
            echo "Branch '$BRANCH_NAME' already exists on remote. A PR is likely already open. Exiting."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y xmlstarlet
          xmlstarlet ed -L -u 'component/releases/release/@version' -v ${VERSION_TAG} -u 'component/releases/release/@date' -v $(date +%Y-%m-%d) extra/com.edde746.plezy.metainfo.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add flatpak.yml extra/com.edde746.plezy.metainfo.xml
          git commit -m "Update Plezy to ${VERSION_TAG}"
          git push -u origin "$BRANCH_NAME"

          gh pr create \
            --title "Update Plezy to ${VERSION_TAG}" \
            --body "Automated update generated by flatpak-external-data-checker. Please review the build checks." \
            --base main \
            --head "$BRANCH_NAME"
