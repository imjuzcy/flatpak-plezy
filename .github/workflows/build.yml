name: Build and Deploy Flatpak

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder pipx yq
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Set up Poetry
        run: pipx install poetry

      - name: Clone external repositories
        run: |
          git clone https://github.com/flatpak/flatpak-builder-tools.git /tmp/flatpak-builder-tools
          git clone --branch $(cat flatpak.yml | yq -r '.modules.[] | select(.name=="mpv").modules.[] | select(.name=="libdovi").sources.[0].tag') https://github.com/quietvoid/dovi_tool.git /tmp/dovi_tool
          git clone https://github.com/TheAppgineer/flatpak-flutter.git /tmp/flatpak-flutter

      - name: Generate cargo sources for libdovi
        run: |
          mkdir -p cargo-sources/libdovi
          cd /tmp/flatpak-builder-tools/cargo
          poetry install
          poetry run python3 flatpak-cargo-generator.py \
            /tmp/dovi_tool/dolby_vision/Cargo.lock \
            -o $GITHUB_WORKSPACE/cargo-sources/libdovi/libdovi.cargo-sources.json

      - name: Prepare Flutter build with flatpak-flutter
        run: |
          cd /tmp/flatpak-flutter
          poetry install
          VENV_PATH=$(poetry env info --path)
          cd $GITHUB_WORKSPACE
          $VENV_PATH/bin/python3 /tmp/flatpak-flutter/flatpak-flutter.py flatpak.yml
          cp ./patches/sqlite3_flutter_libs-0.5.42-CMakeLists.txt.patch ./generated/patches/sqlite3_flutter_libs/0.5.42-CMakeLists.txt.patch
          sed -i 's|generated/patches/sqlite3_flutter_libs/0.5.41-CMakeLists.txt.patch|generated/patches/sqlite3_flutter_libs/0.5.42-CMakeLists.txt.patch|g' ./generated/sources/pubspec.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f com.edde746.plezy.yml
          git add -f generated/*
          git commit -m 'commit processed manifest'
          git push

      - name: Build Flatpak
        run: >
          flatpak-builder --force-clean --sandbox --user
          --install-deps-from=flathub --repo=./repo --install
          build com.edde746.plezy.yml

      - name: Build Flatpak bundle
        run: |
          mkdir -p release
          flatpak build-bundle -vv ./repo ./release/com.edde746.plezy.flatpak com.edde746.plezy

      - name: Upload Flatpak bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.edde746.plezy.flatpak
          path: release/com.edde746.plezy.flatpak

  deploy:
    name: Deploy and Sign Flatpak
    needs: build
    # Restrict deployment to merges/pushes to main, tag creation, or manual triggers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak

      - name: Download Flatpak bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: com.edde746.plezy.flatpak
          path: release

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/com.edde746.plezy.flatpak

      - name: Checkout flatpaks repository
        uses: actions/checkout@v4
        with:
          repository: imjuzcy/flatpaks
          token: ${{ secrets.FLATPAKS_REPO_TOKEN }}
          path: flatpaks-repo

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Import bundle and sign repository
        run: |
          cd flatpaks-repo
          flatpak build-import-bundle --gpg-sign="${{ secrets.GPG_KEY_ID }}" repo ../release/com.edde746.plezy.flatpak
          flatpak build-update-repo --generate-static-deltas --gpg-sign="${{ secrets.GPG_KEY_ID }}" repo

      - name: Commit and push to flatpaks
        run: |
          cd flatpaks-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git commit -m "Update and sign com.edde746.plezy Flatpak" || echo "No changes to commit"
          git push
